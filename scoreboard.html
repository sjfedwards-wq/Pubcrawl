
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scoreboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, Helvetica, Arial, sans-serif;
      background: #111;
      color: white;
      padding: 16px;
    }

    h1 {
      text-align: center;
      margin-bottom: 16px;
    }

    .score-row {
      background: #1b1b1b;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .name {
      font-weight: bold;
    }

    .points {
      color: #00d084;
      font-weight: bold;
    }

    a.back {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #00d084;
      text-decoration: none;
      font-weight: bold;
    }


.status {
  font-style: italic;
  opacity: 0.85;
  margin-left: 10px;
  text-align: right;
}

    
/* Leader highlight */
.leader {
  border: 2px solid gold;
  box-shadow: 0 0 12px rgba(255, 215, 0, 0.6);
}

.leader .name {
  color: gold;
  font-weight: bold;
}



/* Leader highlight */
.leader {
  border: 2px solid gold;
  box-shadow: 0 0 12px rgba(255, 215, 0, 0.6);
}

.leader .name {
  color: gold;
  font-weight: bold;
}

    

.comment {
  font-style: italic;
  opacity: 0.85;
  margin-left: 6px;
}


.drink-track {
  margin-top: 6px;
  font-size: 0.9em;
  opacity: 0.85;
  font-style: italic;
}

    
  </style>
</head>

<body>

<h1>🏆 Scoreboard</h1>

<div id="scoreboard">Loading scores…</div>

<a href="index.html" class="back">← Back to Crawl</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>


function scoreComment(points) {
  if (points <= 4) return "is sober";
  if (points <= 9) return "is warming up";
  if (points <= 13) return "is slightly mashed";
  if (points <= 17) return "is messy";
  if (points <= 21) return "has achieved enlightenment";
  return "has gone too far as usual";
}



  
 
async function loadScoreboard() {

  const { data: participants, error: pError } = await client
    .from("participants")
    .select("id, name, total_points")
    .order("total_points", { ascending: false });

  const { data: drinkLogs, error: dError } = await client
    .from("drink_log")
    .select(`
      participant_id,
      created_at,
      drinks ( label )
    `)
    .order("created_at", { ascending: true });

  if (pError || dError) {
    console.error("Scoreboard load error:", pError || dError);
    return;
  }

  const container = document.getElementById("scoreboard");
  container.innerHTML = "";

  if (!participants || participants.length === 0) {
    container.innerHTML = "<p>No scores yet.</p>";
    return;
  }

  // Group drinks by participant
  const drinksByParticipant = {};

  drinkLogs.forEach(log => {
    if (!drinksByParticipant[log.participant_id]) {
      drinksByParticipant[log.participant_id] = [];
    }
    drinksByParticipant[log.participant_id].push(log.drinks.label);
  });

  const topScore = Math.max(...participants.map(p => p.total_points));

  participants.forEach((p, i) => {
    const isLeader = p.total_points === topScore ? "leader" : "";
    const drinks = drinksByParticipant[p.id]?.join(" → ") || "No drinks logged";

    container.innerHTML += `
      <div class="score-row ${isLeader}">
        <div class="name">
          ${isLeader ? "👑 " : ""}${i + 1}. ${p.name}
          <span class="comment">— ${scoreComment(p.total_points)}</span>
        </div>

        <div class="points">${p.total_points} pts</div>

        <div class="drink-track">
          Drinks: ${drinks}
        </div>
      </div>
    `;
  });
}

  }

  loadScoreboard();
  setInterval(loadScoreboard, 5000);
</script>

</body>
</html>
