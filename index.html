<header>
<h1>🍻 Leicester Pub Crawl</h1>
<div class="sub">Uber-style live crawl tracker</div>

<div class="live-box">
<div class="live-label">LIVE NOW</div>
<div id="currentPub">Loading...</div>
<div id="countdown">Checking schedule...</div>
</div>
</header>

<div class="container" id="pubList"></div>

<footer>
• Pace Yourself • Stay Groovy
</footer>

<script>

let pubs = [];
function renderCards(){
let html="";
pubs.forEach(pub=>{
html += `
<div class="card" id="pub${pub.num}">
<img src="${pub.img}">
<div class="info">
<div class="number">STOP ${pub.num}</div>
<div class="name">${pub.name}</div>
<div class="time">${pub.start} - ${pub.end}</div>
<div class="address">${pub.address}</div>
<a class="btn" href="${pub.map}" target="_blank">Directions</a>
</div>
</div>
`;
});
document.getElementById("pubList").innerHTML = html;
}

function toMinutes(time){
let parts=time.split(":");
return parseInt(parts[0])*60 + parseInt(parts[1]);
}

function liveTracker(){
let now = new Date();
let mins = now.getHours()*60 + now.getMinutes();

let found = false;

for(let pub of pubs){

let start = toMinutes(pub.start);
let end = toMinutes(pub.end);

if(mins >= start && mins <= end){

document.getElementById("currentPub").innerHTML="📍 " + pub.name;
document.getElementById("countdown").innerHTML="Leave at " + pub.end;

document.querySelectorAll(".card").forEach(c=>c.classList.remove("highlight"));
document.getElementById("pub"+pub.num).classList.add("highlight");

found = true;
break;
}
}

if(!found){
document.getElementById("currentPub").innerHTML="🍺 Crawl Not Live Yet";
document.getElementById("countdown").innerHTML="Get ready...";
}
}

</script>

 
<!-- Supabase client -->
