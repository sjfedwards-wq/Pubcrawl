
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leicester Pub Crawl</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: Arial, Helvetica, sans-serif; background:#111; color:white; padding-bottom:120px; }
    header { background:#000; padding:20px; position:sticky; top:0; border-bottom:1px solid #222; }
    h1 { font-size:28px; }
    .sub { color:#aaa; margin-top:5px; font-size:14px; }
    .live-box { margin-top:15px; background:#1c1c1c; padding:15px; border-radius:16px; }
    .live-label { font-size:12px; color:#00d084; font-weight:bold; margin-bottom:6px; }
    #currentPub { font-size:22px; font-weight:bold; }
    #countdown { color:#ccc; font-size:14px; }
    .container { padding:16px; }
    .card { background:#1b1b1b; border-radius:18px; overflow:hidden; margin-bottom:18px; }
    .card img { width:100%; height:220px; object-fit:cover; }
    .info { padding:16px; }
    .number { background:#00d084; color:#000; font-weight:bold; padding:5px 10px; border-radius:30px; display:inline-block; margin-bottom:10px; }
    .name { font-size:22px; margin-bottom:6px; }
    .time { color:#00d084; margin-bottom:6px; }
    .address { color:#bbb; margin-bottom:12px; }
    .btn { display:block; padding:12px; background:white; color:black; text-align:center; border-radius:12px; text-decoration:none; font-weight:bold; }
    footer { position:fixed; bottom:0; left:0; right:0; background:#000; padding:14px; text-align:center; color:#aaa; }
  </style>
</head>

<body>

<header>
  <h1>🍻 Leicester Pub Crawl</h1>
  <div class="sub">Lets rock!</div>

  <div class="live-box">
    <div class="live-label">LIVE NOW</div>
    <div id="currentPub">Loading…</div>
    <div id="countdown">Checking schedule…</div>
  </div>
</header>

<div class="container" id="pubList"></div>

<footer>• Pace Yourself • Stay Groovy</footer>

<script>
  let pubs = [];

  function renderCards() {
    const list = document.getElementById("pubList");
    list.innerHTML = "";

    pubs.forEach(pub => {
      list.innerHTML +=
        '<div class="card">' +
        '<img src="' + pub.img + '">' +
        '<div class="info">' +
        '<div class="number">STOP ' + pub.num + '</div>' +
        '<div class="name">' + pub.name + '</div>' +
        '<div class="time">' + pub.start + ' - ' + pub.end + '</div>' +
        '<div class="address">' + pub.address + '</div>' +
        '<a class="btn" href="' + pub.map + '" target="_blank">Directions</a>' +
        '</div></div>';
    });
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

</body>
</html>
