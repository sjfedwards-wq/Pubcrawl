<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leicester Pub Crawl</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Helvetica, Arial, sans-serif; background: #111;color: white;  padding-bottom: 120px;}
    header {background: #000;  padding: 24px 20px 20px;  position: sticky;  top: 0;  border-bottom: 1px solid #222;  text-align: center;}
    .title {  font-size: 26px;  font-weight: 600;  letter-spacing: 0.3px;  margin-bottom: 6px;}
    h1{font-size:28px;}
    .sub{color:#aaa;font-size:14px;}
    .live-box{margin-top:15px;background:#1c1c1c;padding:15px;border-radius:16px;}
    .live-label{font-size:12px;color:#00d084;font-weight:bold;margin-bottom:6px;animation:pulse 1.5s infinite;}
    @keyframes pulse{0%{opacity:.6}50%{opacity:1}100%{opacity:.6}}
    #currentPub{font-size:22px;font-weight:bold;}
    #countdown{color:#ccc;font-size:14px;}
    .container{padding:16px;}
    .card{background:#1b1b1b;border-radius:18px;overflow:hidden;margin-bottom:18px;transition:.25s;}
    .card.current{transform:scale(1.03);box-shadow:0 14px 36px rgba(0,208,132,.35);border:2px solid #00d084;}
    .card.completed{opacity:.4;filter:grayscale(100%);}
    .card img{width:100%;height:220px;object-fit:cover;}
    .info{padding:16px;}
    .number{background:#00d084;color:#000;font-weight:bold;padding:5px 10px;border-radius:30px;margin-bottom:10px;display:inline-block;}
    .name{font-size:22px;margin-bottom:6px;}
    .time{color:#00d084;margin-bottom:6px;}
    .address{color:#bbb;margin-bottom:12px;}
    .btn{display:block;padding:12px;background:white;color:black;text-align:center;border-radius:12px;text-decoration:none;font-weight:bold;}
    footer{position:fixed;bottom:0;left:0;right:0;background:#000;padding:14px;text-align:center;color:#aaa;}
    
.header-animate {  animation: headerFade 0.35s ease-out;}

@keyframes headerFade {
  from {
    opacity: 0;
    transform: translateY(6px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
    
/* ===== HEADER LOGO ===== */
    .header-logo {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 12px;
    }

    .header-logo img {
      max-width: 220px;
      width: 100%;
      height: auto;
      animation: logoFade 0.4s ease-out;
    }

    @keyframes logoFade {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

/* TEMP TEST — remove after checking */
.header-logo img {
  outline: 2px solid red;
  background: yellow;
}

  </style>
</head>

<body>


<header class="app-header">

  <div class="header-logo">
    <img src="logo.png" alt="The Dandy Boys Pub Crawl">
  </div>

  <div class="sub">2nd May 2026</div>

  <div class="live-box">
    <div class="live-label">LIVE NOW</div>
    <div id="currentPub">Loading…</div>
    <div id="countdown">Checking schedule…</div>
  </div>

</header>


<div class="container" id="pubList"></div>

<footer>• Pace Yourself • Stay Groovy</footer>



<script>
let pubs = [];

function renderCards() {
  const list = document.getElementById("pubList");
  list.innerHTML = "";

  pubs.forEach(pub => {
    const card = document.createElement("div");
    card.classList.add("card");

    if (pub.status === "current") {
      card.classList.add("current");
    }

    if (pub.status === "completed") {
      card.classList.add("completed");
    }

    card.innerHTML = `
     <img src="${pub.img}">
      <div class="info">
        <div class="number">STOP ${pub.num}</div>
        <div class="name">${pub.name}</div>
        <div class="time">${pub.start} - ${pub.end}</div>
        <div class="address">${pub.address}</div>
        <a class="btn" href="${pub.map}" target="_blank">Directions</a>
      </div>
    `;
    list.appendChild(card);
  });
}
</script>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

</body>
</html>
