
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pub Crawl Route</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, Helvetica, Arial, sans-serif;
    }

    header {
      padding: 16px;
      text-align: center;
      border-bottom: 1px solid #222;
    }

    h1 {
      font-size: 20px;
      margin: 0;
    }

    .map-container {
      position: relative;
      width: 100%;
      height: calc(100vh - 60px);
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>

<body>

<header>
  <h1>🍺 Pub Crawl Route</h1>
</header>

<div class="map-container">
<iframe src="https://www.google.com/maps/d/embed?mid=1TWJm_vBDhlpnkBIMojD791VedM79ljs&ehbc=2E312F&noprof=1" ></iframe>
</div>

</body>
</html>
