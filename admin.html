<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pub Crawl Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background:#111;
      color:white;
      padding:20px;
    }

    .pub {
      background:#1b1b1b;
      border-radius:10px;
      padding:14px;
      margin-bottom:12px;
    }

    button {
      margin-top:8px;
      padding:8px 12px;
      border:none;
      border-radius:6px;
      font-weight:bold;
      cursor:pointer;
    }

    .current { background:#ff9800; color:black; }
    .complete { background:#00d084; color:black; }

button {
  margin: 4px;
}

button:nth-child(1) {
  background: #00d084;
  color: black;
}

button:nth-child(2) {
  background: #ff5252;
  color: white;
}

    
button.feedback {
  animation: pressFlash 0.35s ease;
}

@keyframes pressFlash {
  0%   { transform: scale(1);   opacity: 1; }
  50%  { transform: scale(1.15); opacity: 0.7; }
  100% { transform: scale(1);   opacity: 1; }
}

  
  </style>
</head>

<body>

<h2>Participants</h2>

<div id="participantsAdmin">
  Loading participants…
</div>

<hr />

<h2>Log Drinks</h2>

<div id="drinkMatrix">
  Loading drinks…
</div>

<hr /


<h2>Insert New Pub</h2>

<div id="insertPubForm" style="margin-bottom:20px;">
  <input id="newPubName" placeholder="Pub name" /><br /><br />
  <input id="newPubAddress" placeholder="Address" /><br /><br />
  <input id="newPubImage" placeholder="Image URL" /><br /><br />
  <input id="newPubMap" placeholder="Google Maps link" /><br /><br />

  <label>
    Insert after:
    <select id="insertAfterSelect"></select>
  </label>
  <br /><br />

  <button onclick="insertNewPub()">
    Add Pub & Shift Schedule (+30 mins)
  </button>
</div>

<hr />


  
<h1>🍻 Pub Crawl Admin</h1>
<div id="adminList">Loading…</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin.js"></script>

</body>
</html>
